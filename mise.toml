[tools]
rust = "stable"
zig = "0.15.2"

[tasks.build]
description = "Build the bootty app in release mode"
run = "cargo build --release -p bootty-app --bin bootty"

[tasks.test]
description = "Run the workspace test suite"
run = "cargo test --workspace"

[tasks.fmt]
description = "Check formatting"
run = "cargo fmt --all -- --check"

[tasks.clippy]
description = "Run clippy on the workspace"
run = "cargo clippy --workspace --all-targets -- -W clippy::all"

[tasks."bench:build"]
description = "Compile benchmarks without running them"
run = "cargo bench --workspace --no-run"

[tasks."bench:smoke"]
description = "Run each paint plan benchmark once to prove it works"
run = "cargo bench -p bootty-app --bench paint_plan -- --test"

[tasks.package]
description = "Package the app bundle (macOS .app zip or Linux tarball)"
run = "./scripts/package-bootty-unix.sh"

[tasks."package:windows"]
description = "Package the Windows zip"
run = "pwsh ./scripts/package-bootty-windows.ps1"

[tasks.install]
description = "Package and install Bootty.app into /Applications (macOS)"
depends = ["package"]
run = """
#!/usr/bin/env bash
set -euo pipefail
if [[ "$(uname -s)" != "Darwin" ]]; then
  echo "install is macOS-only" >&2
  exit 1
fi
rm -rf /Applications/Bootty.app
cp -R dist/Bootty.app /Applications/Bootty.app
echo "Installed /Applications/Bootty.app"
"""