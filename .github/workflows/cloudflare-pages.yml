name: Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

concurrency:
  group: cloudflare-pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: crates/bootty-tauri/package-lock.json

      - name: Install frontend dependencies
        working-directory: crates/bootty-tauri
        run: npm ci

      - name: Build static demo
        working-directory: crates/bootty-tauri
        run: npm run build:pages

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: 93df7ec23fc4b4ef936f2a0a1f1f5515
          command: pages deploy crates/bootty-tauri/pages-dist --project-name=bootty --branch=main --commit-hash=${{ github.sha }} --commit-message="${{ github.event.head_commit.message }}" --commit-dirty=false
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}